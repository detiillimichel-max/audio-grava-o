<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravador de Áudio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🎧 Todas as gravações</h1>
    </header>

    <main id="recording-list">
        </main>

    <button id="record-btn" class="fab" aria-label="Gravar">
        <span class="record-icon"></span>
    </button>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>Nome da gravação</h2>
            <input type="text" id="recording-name-input" placeholder="Digite um nome..." value="Nova gravação">
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancelar</button>
                <button id="modal-save" class="btn-primary">Salvar</button>
            </div>
        </div>
    </div>

    <audio id="audio-player" style="display: none;"></audio>

    <script src="script.js"></script>
</body>
</html>
